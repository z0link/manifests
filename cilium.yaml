---
k8sServiceHost: "localhost"
k8sServicePort: "7445"
kubeProxyReplacement: true

endpointHealthChecking:
  enabled: false
envoy:
  enabled: true

hubble:
  ui:
    enabled: true
  relay:
    enabled: true
  tls:
    enabled: false

operator:
  enabled: true
  rollOutPods: true
  replicas: 1
  prometheus:
    enabled: false
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
  tolerations:
    - operator: Exists
      effect: NoSchedule
prometheus:
  metricsService: true
  enabled: true
  serviceMonitor:
    enabled: true
    trustCRDsExist: true

cni:
  install: true
  enableRouteMTUForCNIChaining: true
ipam:
  mode: "kubernetes"

nodeIPAM:
  enabled: true

bgpControlPlane:
  enabled: true

nodePort:
  enabled: true
  addresses: ["10.110.3.0/24"]
externalIPs:
  enabled: false

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
serviceMonitor:
  enabled: true
securityContext:
  privileged: true

resources:
  limits:
    cpu: 2
    memory: 2Gi
  requests:
    cpu: 100m
    memory: 128Mi
