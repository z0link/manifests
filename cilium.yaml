---
k8sServiceHost: "10.120.0.1"
k8sServicePort: "443"

envoy:
  enabled: true

hubble:
  ui:
    enabled: true
  relay:
    enabled: true
  tls:
    enabled: false

operator:
  enabled: true
  rollOutPods: true
  replicas: 1
  prometheus:
    enabled: false
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
  tolerations:
    - operator: Exists
      effect: NoSchedule

cni:
  install: true
  enableRouteMTUForCNIChaining: true
ipam:
  mode: "kubernetes"

bgpControlPlane:
  enabled: true

nodePort:
  enabled: true
externalIPs:
  enabled: false

securityContext:
  privileged: true

resources:
  limits:
    cpu: 2
    memory: 2Gi
  requests:
    cpu: 100m
    memory: 128Mi
